name: CURD CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Linux x64 GNU
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: Linux x64 MUSL
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: Linux ARM64 GNU
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            name: Linux ARM64 MUSL
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macOS ARM64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macOS x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            name: Windows ARM64

    steps:
    - uses: actions/checkout@v4

    - name: Install cross-compilation tools
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
        if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
          # Install aarch64 musl tools if needed, though rustup usually handles cross-musl well with standard musl-tools
          # We'll rely on dtolnay/rust-toolchain for the target
          echo "Installing extra tools for ${{ matrix.target }}"
        fi

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Set Cross-Compilation Env
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
        echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
        echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

    - name: Build Core
      run: cargo build --workspace --release --target ${{ matrix.target }}

    - name: Run Tests
      # We only run tests on the native runner architecture to avoid emulation slowness
      if: (matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu') || (matrix.os == 'macos-latest' && matrix.target == 'aarch64-apple-darwin') || (matrix.os == 'windows-latest')
      run: cargo test --workspace --target ${{ matrix.target }}

    - name: Perf Smoke
      if: matrix.os != 'windows-latest'
      run: bash scripts/perf_smoke.sh

    - name: Build Python Extension
      run: |
        cd curd-python
        uv pip install maturin
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          uv run maturin build --release
        else
          uv run maturin build --release --target ${{ matrix.target }}
        fi

    - name: Build Node.js Extension
      run: |
        cd curd-node
        bun install
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          bun x napi build --release
        else
          bun x napi build --release --target ${{ matrix.target }}
        fi
