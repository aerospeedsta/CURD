name: CURD CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  fast-builds:
    name: Fast-CI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Linux-x64-GNU
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: Linux-x64-MUSL
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: Linux-ARM64-GNU
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            name: Linux-ARM64-MUSL
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x86_64
    env:
      CARGO_TERM_COLOR: always
      PYO3_CONFIG_FILE: ${{ github.workspace }}/pyo3_config.ini
    steps:
      - uses: actions/checkout@v4
      - name: Install MUSL tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
        shell: bash
      - name: Set up Zig
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Set Cross-Compilation Env (Zig)
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          TARGET_UPPER=$(echo ${{ matrix.target }} | tr '[:lower:]' '[:upper:]' | tr '-' '_')
          echo "CARGO_TARGET_${TARGET_UPPER}_LINKER=zig cc -- -target ${{ matrix.target }}" >> $GITHUB_ENV
          echo "CC_${{ matrix.target }}=zig cc -- -target ${{ matrix.target }}" >> $GITHUB_ENV
          echo "CXX_${{ matrix.target }}=zig c++ -- -target ${{ matrix.target }}" >> $GITHUB_ENV
          echo "CC=zig cc -- -target ${{ matrix.target }}" >> $GITHUB_ENV
          echo "CXX=zig c++ -- -target ${{ matrix.target }}" >> $GITHUB_ENV
        shell: bash
      - name: Build Core
        run: cargo build --release --target ${{ matrix.target }} -p curd -p curd-core
        shell: bash
      - name: Run Tests
        if: (matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu') || (matrix.os == 'macos-latest' && matrix.target == 'aarch64-apple-darwin')
        run: cargo test --workspace --target ${{ matrix.target }}
        shell: bash
      - name: Build Python Extension
        if: contains(matrix.target, 'musl') == false
        run: |
          cd curd-python
          uvx --with maturin maturin build --release --target ${{ matrix.target }} --out ../dist
        shell: bash
      - name: Perf Smoke
        if: (matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu') || (matrix.os == 'macos-latest' && matrix.target == 'aarch64-apple-darwin')
        run: bash scripts/perf_smoke.sh
        shell: bash
      - name: Build Node.js Extension
        if: contains(matrix.target, 'musl') == false
        run: |
          cd curd-node
          bun install
          bun x napi build --release --target ${{ matrix.target }}
        shell: bash

  slow-builds-windows:
    name: Slow-CI (${{ matrix.name }})
    runs-on: windows-latest
    # Allow skipping Windows if the user adds [skip windows] to the commit message
    if: "!contains(github.event.head_commit.message, '[skip windows]')"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            name: Windows-x64
          - target: aarch64-pc-windows-msvc
            name: Windows-ARM64
    env:
      CARGO_TERM_COLOR: always
      PYO3_CONFIG_FILE: ${{ github.workspace }}/pyo3_config.ini
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Build Core
        run: cargo build --release --target ${{ matrix.target }} -p curd -p curd-core
        shell: bash
      - name: Run Tests
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo test --workspace --target ${{ matrix.target }}
        shell: bash
      - name: Build Python Extension
        run: |
          cd curd-python
          uvx --with maturin maturin build --release --target ${{ matrix.target }} --out ../dist
        shell: bash
