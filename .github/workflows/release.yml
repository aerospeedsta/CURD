name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Release Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: curd-linux-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: curd-linux-x64-musl
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: curd-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: curd-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: curd-windows-x64.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install MUSL tools
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build Release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          cp curd.exe ../../../${{ matrix.artifact_name }}
        else
          cp curd ../../../${{ matrix.artifact_name }}
          chmod +x ../../../${{ matrix.artifact_name }}
        fi

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.artifact_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
