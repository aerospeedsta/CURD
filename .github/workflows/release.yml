name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Release Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: curd-linux-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: curd-linux-x64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: curd-linux-arm64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: curd-linux-arm64-musl
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: curd-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: curd-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: curd-windows-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: curd-windows-arm64.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install MUSL tools
      if: contains(matrix.target, 'musl')
      run: sudo apt-get update && sudo apt-get install -y musl-tools
      shell: bash

    - name: Set up Zig
      if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.13.0

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Set Cross-Compilation Env (Zig)
      if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
      run: |
        TARGET_UPPER=$(echo ${{ matrix.target }} | tr '[:lower:]' '[:upper:]' | tr '-' '_')
        echo "CARGO_TARGET_${TARGET_UPPER}_LINKER=zig cc -- -target ${{ matrix.target }}" >> $GITHUB_ENV
        echo "CC_${{ matrix.target }}=zig cc -- -target ${{ matrix.target }}" >> $GITHUB_ENV
        echo "CXX_${{ matrix.target }}=zig c++ -- -target ${{ matrix.target }}" >> $GITHUB_ENV
        echo "CC=zig cc -- -target ${{ matrix.target }}" >> $GITHUB_ENV
        echo "CXX=zig c++ -- -target ${{ matrix.target }}" >> $GITHUB_ENV
      shell: bash

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Build Release Binaries
      run: cargo build --release --target ${{ matrix.target }} -p curd -p curd-core

    - name: Build Python Extension
      if: contains(matrix.target, 'musl') == false
      run: |
        cd curd-python
        # Use maturin build directly from uvx for a cleaner, isolated build
        uvx --with maturin maturin build --release --target ${{ matrix.target }} --out ../dist
      shell: bash

    - name: Build Node.js Extension
      if: contains(matrix.target, 'musl') == false
      run: |
        cd curd-node
        bun install
        # Always specify target to ensure correct .node name during cross-builds
        bun x napi build --release --target ${{ matrix.target }}
        cp *.node ../dist/ || true

    - name: Package Binary
      shell: bash
      run: |
        mkdir -p dist
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          cp target/${{ matrix.target }}/release/curd.exe dist/${{ matrix.artifact_name }}
        else
          cp target/${{ matrix.target }}/release/curd dist/${{ matrix.artifact_name }}
          chmod +x dist/${{ matrix.artifact_name }}
        fi

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/${{ matrix.artifact_name }}
          dist/*.whl
          dist/*.node
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
