name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Release Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: curd-linux-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: curd-linux-x64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: curd-linux-arm64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: curd-linux-arm64-musl
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: curd-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: curd-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: curd-windows-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: curd-windows-arm64.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install cross-compilation tools
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Set Cross-Compilation Env
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
        echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
        echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Build Release Binaries
      run: cargo build --release --target ${{ matrix.target }}

    - name: Build Python Extension
      run: |
        cd curd-python
        uv pip install maturin
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          uv run maturin build --release --out ../dist
        else
          uv run maturin build --release --target ${{ matrix.target }} --out ../dist
        fi

    - name: Build Node.js Extension
      run: |
        cd curd-node
        bun install
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          bun x napi build --release
        else
          bun x napi build --release --target ${{ matrix.target }}
        fi
        cp *.node ../dist/ || true

    - name: Package Binary
      shell: bash
      run: |
        mkdir -p dist
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          cp target/${{ matrix.target }}/release/curd.exe dist/${{ matrix.artifact_name }}
        else
          cp target/${{ matrix.target }}/release/curd dist/${{ matrix.artifact_name }}
          chmod +x dist/${{ matrix.artifact_name }}
        fi

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/${{ matrix.artifact_name }}
          dist/*.whl
          dist/*.node
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
